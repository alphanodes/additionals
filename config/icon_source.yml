# This file is used by the icons:plugin:generate rake task to download SVG icons from Tabler.
#
# Keys description:
#   - name:  destination icon name (id in icons.svg sprite)
#     svg:   source icon name from tabler-icons GitHub repository
#     style: outline (default) or filled
#
# Note: Tabler version is determined by the Redmine instance running the rake task.
#       Master currently pins v3.43.0. Newer Tabler icons must be maintained as
#       custom symbols in assets/images/icons_custom.svg.
#
# Excluded from this file:
#   - Icons that also exist in Redmine core 6.1 (callers use plugin: "")
#   - Custom icons without Tabler equivalent (in icons_custom.svg)

